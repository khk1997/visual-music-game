<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MIDI Visual - Orchestral Harp</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            cursor: crosshair;
            font-family: "Segoe UI", "Noto Sans TC", sans-serif;
        }

        #app-shell {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 120;
        }

        #mode-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            box-sizing: border-box;
            background:
                radial-gradient(circle at top, rgba(0, 210, 255, 0.16), transparent 42%),
                radial-gradient(circle at bottom, rgba(255, 103, 226, 0.14), transparent 34%),
                linear-gradient(180deg, rgba(2, 7, 16, 0.9), rgba(3, 6, 12, 0.84));
            backdrop-filter: blur(16px);
            pointer-events: auto;
            opacity: 1;
            transition: opacity 0.35s ease;
            overflow: hidden;
        }

        #mode-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #mode-screen::before,
        #mode-screen::after {
            content: '';
            position: absolute;
            width: 42vw;
            height: 42vw;
            min-width: 320px;
            min-height: 320px;
            border-radius: 999px;
            filter: blur(30px);
            opacity: 0.82;
            pointer-events: none;
        }

        #mode-screen::before {
            top: -12vh;
            left: -8vw;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.2), transparent 68%);
            animation: drift-blue 18s ease-in-out infinite alternate;
        }

        #mode-screen::after {
            right: -10vw;
            bottom: -16vh;
            background: radial-gradient(circle, rgba(255, 103, 226, 0.18), transparent 68%);
            animation: drift-violet 22s ease-in-out infinite alternate;
        }

        @keyframes drift-blue {
            from {
                transform: translate3d(0, 0, 0) scale(1);
            }
            to {
                transform: translate3d(10vw, 8vh, 0) scale(1.08);
            }
        }

        @keyframes drift-violet {
            from {
                transform: translate3d(0, 0, 0) scale(1);
            }
            to {
                transform: translate3d(-11vw, -7vh, 0) scale(1.1);
            }
        }

        .mode-panel {
            width: min(980px, 100%);
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 1;
        }

        .mode-header {
            color: #f5fbff;
            text-align: center;
        }

        .mode-eyebrow {
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.48);
            margin-bottom: 14px;
        }

        .mode-title {
            font-size: clamp(34px, 5vw, 62px);
            font-weight: 800;
            letter-spacing: 0.02em;
            margin: 0;
        }

        .mode-subtitle {
            margin: 12px auto 0;
            max-width: 620px;
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255,255,255,0.7);
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .mode-card {
            position: relative;
            min-height: 280px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 32px;
            border-top-left-radius: 18px;
            border-bottom-right-radius: 18px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
                rgba(7, 14, 24, 0.8);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.08),
                0 24px 60px rgba(0,0,0,0.45);
            color: #fff;
            text-align: left;
            cursor: pointer;
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
            overflow: hidden;
        }

        .mode-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            opacity: 0;
            transition: opacity 0.22s ease, border-color 0.22s ease;
            pointer-events: none;
        }

        .mode-card::before {
            content: '';
            position: absolute;
            inset: auto -10% -35% auto;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            filter: blur(12px);
            opacity: 0.55;
            pointer-events: none;
        }

        .mode-card[data-mode="free-play"]::before {
            background: radial-gradient(circle, rgba(0, 210, 255, 0.4), transparent 70%);
        }

        .mode-card[data-mode="absolute-pitch"]::before {
            background: radial-gradient(circle, rgba(255, 103, 226, 0.38), transparent 70%);
        }

        .mode-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,0.36);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.14),
                0 0 0 1px rgba(255,255,255,0.14),
                0 28px 70px rgba(0,0,0,0.52);
        }

        .mode-card:hover::after {
            opacity: 1;
            border-color: rgba(255, 255, 255, 0.42);
        }

        .mode-card-label {
            display: inline-flex;
            align-items: center;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.72);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .mode-card-title {
            margin: 18px 0 10px;
            font-size: clamp(28px, 3vw, 40px);
            font-weight: 800;
        }

        .mode-card-copy {
            margin: 0;
            max-width: 28ch;
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255,255,255,0.72);
        }

        .mode-card-footer {
            position: absolute;
            left: 28px;
            right: 28px;
            bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: rgba(255,255,255,0.76);
            font-size: 13px;
        }

        #playback-screen {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.28s ease;
        }

        #playback-screen.active {
            opacity: 1;
        }

        #top-bar {
            position: absolute;
            top: 24px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 101;
            pointer-events: auto;
        }

        .top-bar-button {
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(10, 15, 25, 0.78);
            color: #f4fbff;
            border-radius: 999px;
            padding: 9px 14px;
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition:
                transform 0.18s ease,
                border-color 0.18s ease,
                background 0.18s ease,
                box-shadow 0.18s ease,
                color 0.18s ease;
        }

        .top-bar-button:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.42);
            background: rgba(18, 32, 50, 0.92);
            color: #ffffff;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.14),
                0 10px 24px rgba(0,0,0,0.3),
                0 0 22px rgba(0, 210, 255, 0.16);
        }

        .top-bar-button:active {
            transform: translateY(0);
        }

        .top-bar-button.is-active {
            border-color: rgba(255, 120, 120, 0.62);
            background: rgba(72, 18, 24, 0.92);
            box-shadow:
                0 0 0 1px rgba(255, 120, 120, 0.18),
                0 12px 26px rgba(0,0,0,0.34),
                0 0 26px rgba(255, 82, 82, 0.2);
        }

        .top-bar-button.is-disabled {
            opacity: 0.5;
        }

        #background-toggle {
            min-width: 146px;
            text-align: left;
        }

        #mode-status {
            color: rgba(255,255,255,0.68);
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #bottom-ui {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 86%;
            height: 124px;
            display: flex;
            gap: 12px;
            z-index: 100;
            pointer-events: auto;
            align-items: stretch;
        }

        #bottom-ui.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #key-panel {
            width: 230px;
            height: 100%;
            background: rgba(10, 15, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 11px 10px 11px;
            box-sizing: border-box;
            box-shadow:
                0 15px 40px rgba(0,0,0,0.9),
                0 0 20px rgba(0,210,255,0.05);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        #current-key-label {
            font-size: 15px;
            font-weight: 700;
            color: #00d2ff;
            margin-bottom: 6px;
            line-height: 1.05;
        }

        #key-hint {
            font-size: 8px;
            line-height: 1.15;
            color: rgba(255,255,255,0.68);
            margin-bottom: 10px;
        }

        .single-row {
            display: flex;
            margin-bottom: 10px;
        }

        .control-row {
            display: flex;
            gap: 6px;
            margin-top: 0;
        }

        .custom-select {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .custom-select select {
            width: 100%;
            height: 28px;
            position: static;
            left: unset;
            top: unset;
            z-index: 1;
            background: rgba(255,255,255,0.06);
            padding-right: 28px;
        }

        #sound-select,
        #key-select,
        #mode-select {
            flex: 1;
            height: 28px;
            padding: 0 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.06);
            color: #fff;
            outline: none;
            font-size: 10px;
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            padding-right: 28px; /* 預留箭頭空間 */
        }

        /* 自訂下拉箭頭 */
        .custom-select::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 12px;
            width: 8px;
            height: 8px;
            pointer-events: none;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: translateY(-60%) rotate(-45deg);
            opacity: 0.7;
            z-index: 2;
        }

        /* 讓 option 也盡量維持白字深底，雖然部分瀏覽器不支援 */
        #sound-select option,
        #key-select option,
        #mode-select option {
            background: #222;
            color: #fff;
        }

        #piano-container {
            flex: 1;
            height: 100%;
            background: rgba(10, 15, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 6px;
            box-sizing: border-box;
            box-shadow:
                0 15px 40px rgba(0,0,0,0.9),
                0 0 20px rgba(0,210,255,0.05);
            display: flex;
            overflow: hidden;
        }

        #piano-ui {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .key.white {
            flex: 1 0 1.923%;
            height: 100%;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            box-sizing: border-box;
            z-index: 1;
            transition: background 0.1s;
        }

        .key.black {
            flex: 0 0 1.2%;
            height: 60%;
            background: #222;
            border: 1px solid #000;
            margin-left: -0.6%;
            margin-right: -0.6%;
            z-index: 2;
            border-radius: 0 0 3px 3px;
            transition: background 0.1s;
        }

        .key.user-active {
            background: #00d2ff !important;
            box-shadow: 0 0 20px #00d2ff;
            border-color: #00d2ff;
        }

        .key.playback-active {
            background: #ff4d5f !important;
            box-shadow: 0 0 20px #ff4d5f;
            border-color: #ff4d5f;
        }

        .key.mixed-active {
            background: #c94cff !important;
            box-shadow: 0 0 22px #c94cff;
            border-color: #c94cff;
        }

        @media (max-width: 820px) {
            .mode-grid {
                grid-template-columns: 1fr;
            }

            .mode-card {
                min-height: 220px;
            }

            #bottom-ui {
                width: calc(100% - 24px);
                left: 12px;
                transform: none;
                bottom: 12px;
                flex-direction: column;
                height: auto;
            }

            #key-panel {
                width: 100%;
                height: auto;
            }

            #piano-container {
                min-height: 116px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
</head>
<body>
    <div id="app-shell">
        <div id="mode-screen">
            <div class="mode-panel">
                <div class="mode-header">
                    <div class="mode-eyebrow">Visual Music Game</div>
                    <h1 class="mode-title">選擇你的進入方式</h1>
                    <p class="mode-subtitle">先從首頁挑選模式。自由演奏會直接進入目前的演奏介面，絕對音感測試則先保留成下一步擴充的入口。</p>
                </div>
                <div class="mode-grid">
                    <button class="mode-card" id="free-play-card" data-mode="free-play" type="button">
                        <span class="mode-card-label">Mode 01</span>
                        <h2 class="mode-card-title">自由演奏模式</h2>
                        <p class="mode-card-copy">進入即時音樂遊玩畫面，用鍵盤或滑鼠觸發音符、火花和背景波浪。</p>
                        <div class="mode-card-footer">
                            <span>立即開始</span>
                            <span>Enter</span>
                        </div>
                    </button>
                    <button class="mode-card" id="absolute-pitch-card" data-mode="absolute-pitch" type="button">
                        <span class="mode-card-label">Mode 02</span>
                        <h2 class="mode-card-title">絕對音感測試</h2>
                        <p class="mode-card-copy">之後可以放聽音辨識、答題流程、分數結算與難度設計，先把入口位置保留下來。</p>
                        <div class="mode-card-footer">
                            <span>準備中</span>
                            <span>Soon</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <div id="playback-screen">
            <div id="top-bar">
                <button id="back-home" class="top-bar-button" type="button">Back</button>
                <button id="background-toggle" class="top-bar-button" type="button">Background: PlayStation Style</button>
                <button id="record-toggle" class="top-bar-button" type="button">Record</button>
                <button id="playback-toggle" class="top-bar-button" type="button">Playback</button>
                <div id="mode-status">Free Play</div>
            </div>

            <div id="bottom-ui" class="hidden">
                <div id="key-panel">
                    <div id="current-key-label">C Major</div>

                    <div id="key-hint">Shift：升半音 / Ctrl：降半音</div>

                    <div class="single-row custom-select">
                        <select id="sound-select">
                            <option value="synth">Synth</option>
                            <option value="piano">Piano</option>
                            <option value="harp">Harp</option>
                            <option value="bell">Bell</option>
                            <option value="marimba_kalimba">Marimba/Kalimba</option>
                            <option value="chiptune_lead">Chiptune Lead</option>
                            <option value="lofi_ep">Lo-fi EP</option>
                        </select>
                    </div>

                    <div class="control-row">
                        <div class="custom-select" style="flex:1;">
                            <select id="key-select">
                                <option value="C">C</option>
                                <option value="C#">C#</option>
                                <option value="D">D</option>
                                <option value="Eb">Eb</option>
                                <option value="E">E</option>
                                <option value="F">F</option>
                                <option value="F#">F#</option>
                                <option value="G">G</option>
                                <option value="Ab">Ab</option>
                                <option value="A">A</option>
                                <option value="Bb">Bb</option>
                                <option value="B">B</option>
                            </select>
                        </div>
                        <div class="custom-select" style="flex:1;">
                            <select id="mode-select">
                                <option value="major">Major</option>
                                <option value="minor">Minor</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="piano-container">
                    <div id="piano-ui"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // =========================================================
        // 1. 音源設定
        // =========================================================
        let instrument = null;
        let playbackInstrument = null;
        let reverb = null;
        let limiter = null;
        let audioStarted = false;
        let currentSound = 'synth';
        let recordedSoundType = 'synth';
        let lofiVibrato = null;
        let lofiFilter = null;
        const activePianoKeyStates = new Map();
        let playbackLofiVibrato = null;
        let playbackLofiFilter = null;
        const liveKeyHighlights = new Map();
        const playbackKeyHighlights = new Map();
        const PIANO_TAP_DURATION = 0.12;
        let currentScreen = 'home';

        const modeScreen = document.getElementById('mode-screen');
        const playbackScreen = document.getElementById('playback-screen');
        const bottomUi = document.getElementById('bottom-ui');
        const freePlayCard = document.getElementById('free-play-card');
        const absolutePitchCard = document.getElementById('absolute-pitch-card');
        const backHomeButton = document.getElementById('back-home');
        const backgroundToggleButton = document.getElementById('background-toggle');
        const recordToggleButton = document.getElementById('record-toggle');
        const playbackToggleButton = document.getElementById('playback-toggle');
        const soundSelect = document.getElementById('sound-select');

        const BACKGROUND_THEMES = [
            { id: 'playstation-style', label: 'PlayStation Style', color: 0x000000, exposure: 2.0 },
            { id: 'deep-blue', label: 'Deep Blue', color: 0x03111f, exposure: 1.75 },
            { id: 'violet-dusk', label: 'Violet Dusk', color: 0x13091d, exposure: 1.9 }
        ];
        let currentBackgroundIndex = 0;
        let backgroundVisualsReady = false;
        let isRecording = false;
        let recordingStartTime = 0;
        let recordedEvents = [];
        let isPlaybackActive = false;
        let playbackEndTimer = null;
        const playbackTimers = [];
        const playbackPianoNotes = new Map();
        let playbackLoopDuration = 0;

        // 各音色音量（單位：dB）
        const INSTRUMENT_VOLUMES = {
            synth: 0,
            piano: 3,
            harp: 10,
            bell: 0,
            marimba_kalimba: 2,
            chiptune_lead: -9,
            lofi_ep: -2
        };

        const PIANO_SAMPLE_CONFIG = {
            urls: {
                A1: "A1.mp3",
                C2: "C2.mp3",
                "D#2": "Ds2.mp3",
                "F#2": "Fs2.mp3",
                A2: "A2.mp3",
                C3: "C3.mp3",
                "D#3": "Ds3.mp3",
                "F#3": "Fs3.mp3",
                A3: "A3.mp3",
                C4: "C4.mp3",
                "D#4": "Ds4.mp3",
                "F#4": "Fs4.mp3",
                A4: "A4.mp3",
                C5: "C5.mp3",
                "D#5": "Ds5.mp3",
                "F#5": "Fs5.mp3",
                A5: "A5.mp3",
                C6: "C6.mp3",
                "D#6": "Ds6.mp3",
                "F#6": "Fs6.mp3",
                A6: "A6.mp3",
                C7: "C7.mp3",
                "D#7": "Ds7.mp3",
                "F#7": "Fs7.mp3",
                A7: "A7.mp3",
                C8: "C8.mp3"
            },
            baseUrl: "https://tonejs.github.io/audio/salamander/"
        };

        const HARP_SAMPLE_CONFIG = {
            urls: {
                A2: "A2.wav",
                C3: "C3.wav",
                E3: "E3.wav",
                A4: "A4.wav",
                C5: "C5.wav",
                E5: "E5.wav",
                A6: "A6.wav"
            },
            baseUrl: "./harp/"
        };
        const PIANO_RELEASE = 0.18;
        const LOW_LATENCY_CONFIG = {
            lookAhead: 0.005,
            updateInterval: 0.01
        };

        function getToneContext() {
            if (typeof Tone.getContext === 'function') return Tone.getContext();
            return Tone.context;
        }

        function applyLowLatencyMode() {
            const toneContext = getToneContext();
            if (toneContext) {
                toneContext.lookAhead = LOW_LATENCY_CONFIG.lookAhead;
                toneContext.updateInterval = LOW_LATENCY_CONFIG.updateInterval;
            }
        }

        function getTriggerTime() {
            if (typeof Tone.immediate === 'function') {
                return Tone.immediate();
            }
            return Tone.now();
        }

        function applyInstrumentVolumeTo(targetInstrument, type) {
            if (!targetInstrument || !targetInstrument.volume) return;
            targetInstrument.volume.value = INSTRUMENT_VOLUMES[type] ?? 0;
        }

        function disposeLofiChain(vibratoRef, filterRef) {
            if (vibratoRef && typeof vibratoRef.dispose === 'function') {
                vibratoRef.dispose();
            }
            if (filterRef && typeof filterRef.dispose === 'function') {
                filterRef.dispose();
            }
        }

        function disposeCurrentInstrument() {
            disposeLofiChain(lofiVibrato, lofiFilter);
            if (instrument && typeof instrument.dispose === 'function') {
                instrument.dispose();
            }
            instrument = null;
            lofiVibrato = null;
            lofiFilter = null;
            activePianoKeyStates.clear();
        }

        function disposePlaybackInstrument() {
            disposeLofiChain(playbackLofiVibrato, playbackLofiFilter);
            if (playbackInstrument && typeof playbackInstrument.dispose === 'function') {
                playbackInstrument.dispose();
            }
            playbackInstrument = null;
            playbackLofiVibrato = null;
            playbackLofiFilter = null;
            playbackPianoNotes.clear();
        }

        async function createInstrumentInstance(type) {
            let nextInstrument = null;
            let nextLofiVibrato = null;
            let nextLofiFilter = null;

            if (type === 'piano') {
                nextInstrument = new Tone.Sampler({
                    urls: PIANO_SAMPLE_CONFIG.urls,
                    baseUrl: PIANO_SAMPLE_CONFIG.baseUrl,
                    release: PIANO_RELEASE
                }).connect(reverb);

                await Tone.loaded();
            }
            else if (type === 'harp') {
                nextInstrument = new Tone.Sampler({
                    urls: HARP_SAMPLE_CONFIG.urls,
                    baseUrl: HARP_SAMPLE_CONFIG.baseUrl
                }).connect(reverb);

                await Tone.loaded();
            }
            else if (type === 'synth') {
                nextInstrument = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: {
                        attack: 0.005,
                        decay: 0.1,
                        sustain: 0.3,
                        release: 1.2
                    }
                }).connect(reverb);
            }
            else if (type === 'bell') {
                nextInstrument = new Tone.PolySynth(Tone.FMSynth, {
                    harmonicity: 8,
                    modulationIndex: 12,
                    envelope: {
                        attack: 0.001,
                        decay: 1.2,
                        sustain: 0,
                        release: 1.5
                    },
                    modulation: {
                        type: "sine"
                    },
                    modulationEnvelope: {
                        attack: 0.002,
                        decay: 0.3,
                        sustain: 0,
                        release: 0.8
                    }
                }).connect(reverb);
            }
            else if (type === 'marimba_kalimba') {
                nextInstrument = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle8" },
                    envelope: {
                        attack: 0.001,
                        decay: 0.22,
                        sustain: 0.0,
                        release: 0.28
                    }
                }).connect(reverb);
            }
            else if (type === 'chiptune_lead') {
                nextInstrument = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "square" },
                    envelope: {
                        attack: 0.002,
                        decay: 0.08,
                        sustain: 0.45,
                        release: 0.12
                    }
                }).connect(reverb);
            }
            else if (type === 'lofi_ep') {
                nextInstrument = new Tone.PolySynth(Tone.FMSynth, {
                    harmonicity: 1.5,
                    modulationIndex: 3.5,
                    detune: 0,
                    oscillator: { type: "triangle" },
                    envelope: {
                        attack: 0.015,
                        decay: 0.35,
                        sustain: 0.28,
                        release: 1.1
                    },
                    modulation: { type: "sine" },
                    modulationEnvelope: {
                        attack: 0.02,
                        decay: 0.2,
                        sustain: 0.0,
                        release: 0.6
                    }
                });

                nextLofiVibrato = new Tone.Vibrato({
                    frequency: 4.2,
                    depth: 0.08,
                    type: "sine"
                });
                nextLofiFilter = new Tone.Filter({
                    type: "lowpass",
                    frequency: 3600,
                    rolloff: -24,
                    Q: 0.8
                });

                nextInstrument.chain(nextLofiVibrato, nextLofiFilter, reverb);
            }

            applyInstrumentVolumeTo(nextInstrument, type);
            return {
                instrument: nextInstrument,
                lofiVibrato: nextLofiVibrato,
                lofiFilter: nextLofiFilter
            };
        }

        async function createPianoInstrument() {
            disposeCurrentInstrument();

            const created = await createInstrumentInstance('piano');
            instrument = created.instrument;
            lofiVibrato = created.lofiVibrato;
            lofiFilter = created.lofiFilter;
        }

        async function createHarpInstrument() {
            disposeCurrentInstrument();

            const created = await createInstrumentInstance('harp');
            instrument = created.instrument;
            lofiVibrato = created.lofiVibrato;
            lofiFilter = created.lofiFilter;
        }

            const created = await createInstrumentInstance(type);
            playbackInstrument = created.instrument;
            playbackLofiVibrato = created.lofiVibrato;

        async function createInstrument(type) {
            if (type === 'piano') {
                await createPianoInstrument();
            }
            else if (type === 'harp') {
                await createHarpInstrument();
            }
            else {
                disposeCurrentInstrument();
                const created = await createInstrumentInstance(type);
                instrument = created.instrument;
                lofiVibrato = created.lofiVibrato;
                lofiFilter = created.lofiFilter;
            }

            currentSound = type;
        }

        async function initAudio() {
            if (audioStarted) return;

            await Tone.start();
            applyLowLatencyMode();

            limiter = new Tone.Limiter(-1).toDestination();
            reverb = new Tone.Reverb({
                decay: 2.5,
                wet: 0.3
            }).connect(limiter);

            await createInstrument(currentSound);
            audioStarted = true;
        }

        function playMidiWithInstrument(targetInstrument, soundType, midi) {
            if (!targetInstrument) return;
            const note = Tone.Frequency(midi, "midi").toNote();
            const triggerTime = getTriggerTime();

            if (soundType === 'piano') {
                targetInstrument.triggerAttackRelease(note, 1.4, triggerTime);
            } else if (soundType === 'harp') {
                targetInstrument.triggerAttackRelease(note, 2.0, triggerTime);
            } else if (soundType === 'bell') {
                targetInstrument.triggerAttackRelease(note, "2n", triggerTime);
            } else if (soundType === 'marimba_kalimba') {
                targetInstrument.triggerAttackRelease(note, "8n", triggerTime);
            } else if (soundType === 'chiptune_lead') {
                targetInstrument.triggerAttackRelease(note, "16n", triggerTime);
            } else if (soundType === 'lofi_ep') {
                targetInstrument.triggerAttackRelease(note, "4n", triggerTime);
            } else {
                targetInstrument.triggerAttackRelease(note, "8n", triggerTime);
            }
        }

        function playMidi(midi) {
            playMidiWithInstrument(instrument, currentSound, midi);
        }

        function playPianoKeyDown(key, midi) {
            if (!instrument || currentSound !== 'piano' || activePianoKeyStates.has(key)) return;

            const note = Tone.Frequency(midi, "midi").toNote();
            const startTime = getTriggerTime();

            instrument.triggerAttack(note, startTime);
            activePianoKeyStates.set(key, { note, startTime, midi });
        }

        function releasePianoKey(key) {
            if (!instrument) return;

            const state = activePianoKeyStates.get(key);
            if (!state) return;

            const now = getTriggerTime();
            const heldFor = now - state.startTime;
            const releaseTime = heldFor < PIANO_TAP_DURATION
                ? now + (PIANO_TAP_DURATION - heldFor)
                : now;

            instrument.triggerRelease(state.note, releaseTime);
            activePianoKeyStates.delete(key);
        }

        const pianoUi = document.getElementById('piano-ui');

        function createPianoKeys() {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

            for (let midi = 21; midi <= 108; midi++) {

        function updateKeyHighlightState(midi) {
            const keyEl = allKeysMap[midi];
            if (!keyEl) return;

            const hasLive = (liveKeyHighlights.get(midi) ?? 0) > 0;
            const hasPlayback = (playbackKeyHighlights.get(midi) ?? 0) > 0;

            keyEl.classList.remove('user-active', 'playback-active', 'mixed-active');

            if (hasLive && hasPlayback) keyEl.classList.add('mixed-active');
            else if (hasLive) keyEl.classList.add('user-active');
            else if (hasPlayback) keyEl.classList.add('playback-active');
        }

        function highlightKey(source, midi, active) {
            const targetMap = source === 'playback' ? playbackKeyHighlights : liveKeyHighlights;
            const currentCount = targetMap.get(midi) ?? 0;

            if (active) {
                targetMap.set(midi, currentCount + 1);
            } else if (currentCount <= 1) {
                targetMap.delete(midi);
            } else {
                targetMap.set(midi, currentCount - 1);
            }

            updateKeyHighlightState(midi);
        }

        function clearHighlightMap(targetMap) {
            for (const midi of Array.from(targetMap.keys())) {
                targetMap.delete(midi);
                updateKeyHighlightState(midi);
            }
        }

        function isInteractivePlayback() {

        function setScreen(nextScreen) {
            currentScreen = nextScreen;

        function nowSeconds() {
            return performance.now() * 0.001;
        }

        function updateTransportButtons() {
            recordToggleButton.textContent = isRecording ? 'Stop Rec' : 'Record';
            recordToggleButton.classList.toggle('is-active', isRecording);

            playbackToggleButton.textContent = isPlaybackActive ? 'Stop Loop' : 'Playback';
            playbackToggleButton.classList.toggle('is-active', isPlaybackActive);

            const playbackDisabled = isRecording || recordedEvents.length === 0;
            playbackToggleButton.classList.toggle('is-disabled', playbackDisabled);
            playbackToggleButton.disabled = playbackDisabled;
        }

        function stopPlayback() {
            for (const timer of playbackTimers) {
                clearTimeout(timer);
            }
            playbackTimers.length = 0;

            if (playbackEndTimer !== null) {
                clearTimeout(playbackEndTimer);
                playbackEndTimer = null;
            }

            for (const midi of Array.from(playbackPianoNotes.keys())) {
                releasePlaybackPianoMidi(midi);
            }

            clearHighlightMap(playbackKeyHighlights);
            isPlaybackActive = false;
            updateTransportButtons();
        }

        function stopRecording() {
            isRecording = false;
            updateTransportButtons();
        }

        function startRecording() {
            stopPlayback();
            recordedEvents = [];
            recordedSoundType = currentSound;
            recordingStartTime = nowSeconds();
            isRecording = true;
            updateTransportButtons();
        }

        function recordPerformanceEvent(event) {
            if (!isRecording) return;

            recordedEvents.push({
                ...event,
                time: nowSeconds() - recordingStartTime
            });
        }

        function attackPlaybackPianoMidi(midi) {
            if (!playbackInstrument || recordedSoundType !== 'piano' || playbackPianoNotes.has(midi)) return;

            const note = Tone.Frequency(midi, "midi").toNote();
            const startTime = getTriggerTime();
            playbackInstrument.triggerAttack(note, startTime);
            playbackPianoNotes.set(midi, { note, startTime });
        }

        function releasePlaybackPianoMidi(midi) {
            if (!playbackInstrument) return;

            const state = playbackPianoNotes.get(midi);
            if (!state) return;

            const now = getTriggerTime();
            const heldFor = now - state.startTime;
            const releaseTime = heldFor < PIANO_TAP_DURATION
                ? now + (PIANO_TAP_DURATION - heldFor)
                : now;

            playbackInstrument.triggerRelease(state.note, releaseTime);
            playbackPianoNotes.delete(midi);
        }

        function playVisualFeedback(source, midi, ringX, ringY) {
            const ringPoint = new THREE.Vector3(ringX, ringY, RING_PLANE_Z);
            const mistPoint = projectPointToPlane(ringPoint, MIST_PLANE_Z);
            const bgPoint = projectPointToPlane(ringPoint, BG_PLANE_Z);
            const sparkPoint = projectPointToPlane(ringPoint, SPARK_PLANE_Z);

            triggerInteraction(source, bgPoint, midi);
            spawnMist(mistPoint, midi);
            spawnSparks(sparkPoint);
        }

        function schedulePlaybackLoopPass() {
            if (!isPlaybackActive) return;

            for (const event of recordedEvents) {
                const timer = setTimeout(() => {
                    if (!isPlaybackActive) return;

                    if (event.type === 'note-on') {
                        playVisualFeedback('playback', event.midi, event.ringX, event.ringY);

                        if (recordedSoundType === 'piano' && event.sustained) {
                            attackPlaybackPianoMidi(event.midi);
                        } else {
                            playMidiWithInstrument(playbackInstrument, recordedSoundType, event.midi);
                        }
                    } else if (event.type === 'note-off' && recordedSoundType === 'piano') {
                        releasePlaybackPianoMidi(event.midi);
                    }
                }, Math.max(0, event.time * 1000));

                playbackTimers.push(timer);
            }

            playbackEndTimer = setTimeout(() => {
                for (const midi of Array.from(playbackPianoNotes.keys())) {
                    releasePlaybackPianoMidi(midi);
                }

                schedulePlaybackLoopPass();
            }, playbackLoopDuration * 1000);
        }

        async function startPlayback() {
            if (recordedEvents.length === 0 || isRecording) return;

            stopPlayback();

            try {
                await initAudio();
                await createPlaybackInstrument(recordedSoundType);
            } catch (err) {
                console.error('Playback audio init failed:', err);
                return;
            }

            isPlaybackActive = true;
            updateTransportButtons();
            playbackLoopDuration = recordedEvents.reduce((maxTime, event) => Math.max(maxTime, event.time), 0) + 0.25;
            schedulePlaybackLoopPass();
        }

        recordToggleButton.addEventListener('click', () => {

        // =========================================================

        const keySelect = document.getElementById('key-select');

        const NOTE_TO_PC = {
            'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3,
            'E': 4, 'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8,
            'Ab': 8, 'A': 9, 'A#': 10, 'Bb': 10, 'B': 11
        };

        const MAJOR_SCALE = [0, 2, 4, 5, 7, 9, 11];
        const NATURAL_MINOR_SCALE = [0, 2, 3, 5, 7, 8, 10];

        let currentKeyRoot = 'C';
        let currentMode = 'major';

        function getCurrentScale() {
            return currentMode === 'major' ? MAJOR_SCALE : NATURAL_MINOR_SCALE;
        }

        function updateKeyUI() {

        updateKeyUI();

        // =========================================================
        // 4. 鍵位映射
        // =========================================================
        const scaleKeyMap = {
            'z': { degree: 0, octaveBase: 48 },
            'x': { degree: 1, octaveBase: 48 },
            'c': { degree: 2, octaveBase: 48 },
            'v': { degree: 3, octaveBase: 48 },
            'b': { degree: 4, octaveBase: 48 },
            'n': { degree: 5, octaveBase: 48 },
            'm': { degree: 6, octaveBase: 48 },

            'a': { degree: 0, octaveBase: 60 },
            's': { degree: 1, octaveBase: 60 },
            'd': { degree: 2, octaveBase: 60 },
            'f': { degree: 3, octaveBase: 60 },
            'g': { degree: 4, octaveBase: 60 },
            'h': { degree: 5, octaveBase: 60 },
            'j': { degree: 6, octaveBase: 60 },
            'k': { degree: 0, octaveBase: 72 },
            'l': { degree: 1, octaveBase: 72 },

            'q': { degree: 0, octaveBase: 72 },
            'w': { degree: 1, octaveBase: 72 },
            'e': { degree: 2, octaveBase: 72 },
            'r': { degree: 3, octaveBase: 72 },
            't': { degree: 4, octaveBase: 72 },
            'y': { degree: 5, octaveBase: 72 },

            'i': { degree: 0, octaveBase: 84 },
            'o': { degree: 1, octaveBase: 84 },
            'p': { degree: 2, octaveBase: 84 }
        };

        function getMidiFromScaleKey(key, shiftKey, ctrlKey) {
            const info = scaleKeyMap[key];
            if (!info) return null;

            const rootPc = NOTE_TO_PC[currentKeyRoot];
            const scale = getCurrentScale();
            const baseCMidi = info.octaveBase;
            const rootMidi = baseCMidi + rootPc;

            let midi = rootMidi + scale[info.degree];

            if (shiftKey) midi += 1;
            if (ctrlKey) midi -= 1;

            return Math.max(21, Math.min(108, midi));
        }

        // =========================================================
        // 6. 貼圖生成
        // =========================================================
        function createPS5Textures() {
            function makeCanvas() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.lineCap = 'round';
                return { canvas, ctx };
            }

            function drawSparkShapes(ctx, x, c, lw, sb) {
                ctx.save();
                ctx.translate(x, 64);
                ctx.shadowColor = c;
                ctx.shadowBlur = sb;
                ctx.strokeStyle = c;
                ctx.lineWidth = lw;

                // 底層加一圈較淡的粗描邊，做出一點厚度感
                ctx.globalAlpha = 0.38;
                ctx.lineWidth = lw + 4;
                if (x === 64) {
                    ctx.beginPath();
                    ctx.moveTo(-30, -30);
                    ctx.lineTo(30, 30);
                    ctx.moveTo(30, -30);
                    ctx.lineTo(-30, 30);
                    ctx.stroke();
                }
                if (x === 192) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 35, 0, Math.PI * 2);
                    ctx.stroke();
                }
                if (x === 320) {
                    ctx.beginPath();
                    ctx.moveTo(0, -35);
                    ctx.lineTo(-35, 30);
                    ctx.lineTo(35, 30);
                    ctx.closePath();
                    ctx.stroke();
                }
                if (x === 448) {
                    ctx.beginPath();
                    ctx.rect(-30, -30, 60, 60);
                    ctx.stroke();
                }

                ctx.globalAlpha = 1;
                ctx.lineWidth = lw;
                if (x === 64) {
                    ctx.beginPath();
                    ctx.moveTo(-30, -30);
                    ctx.lineTo(30, 30);
                    ctx.moveTo(30, -30);
                    ctx.lineTo(-30, 30);
                    ctx.stroke();
                }
                if (x === 192) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 35, 0, Math.PI * 2);
                    ctx.stroke();
                }
                if (x === 320) {
                    ctx.beginPath();
                    ctx.moveTo(0, -35);
                    ctx.lineTo(-35, 30);
                    ctx.lineTo(35, 30);
                    ctx.closePath();
                    ctx.stroke();
                }
                if (x === 448) {
                    ctx.beginPath();
                    ctx.rect(-30, -30, 60, 60);
                    ctx.stroke();
                }

                ctx.restore();
            }

            function carveHollowShape(ctx, x) {
                if (x === 64) {
                    ctx.beginPath();
                    ctx.moveTo(-20, -20);
                    ctx.lineTo(20, 20);
                    ctx.moveTo(20, -20);
                    ctx.lineTo(-20, 20);
                    ctx.stroke();
                }
                if (x === 192) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 18, 0, Math.PI * 2);
                    ctx.stroke();
                }
                if (x === 320) {
                    ctx.beginPath();
                    ctx.moveTo(0, -23);
                    ctx.lineTo(-21, 16);
                    ctx.lineTo(21, 16);
                    ctx.closePath();
                    ctx.stroke();
                }
                if (x === 448) {
                    ctx.beginPath();
                    ctx.rect(-18, -18, 36, 36);
                    ctx.stroke();
                }
            }

            function drawBackgroundShapes(ctx, x, fillColor) {
                ctx.save();
                ctx.translate(x, 64);
                ctx.shadowColor = fillColor;
                ctx.shadowBlur = 10;
                ctx.fillStyle = fillColor;

                ctx.beginPath();
                ctx.arc(0, 0, 31, 0, Math.PI * 2);
                ctx.fill();

                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 7;
                carveHollowShape(ctx, x);
                ctx.restore();
            }

            const { canvas: cC, ctx: cCtx } = makeCanvas();
            drawSparkShapes(cCtx, 64, '#00d2ff', 8.8, 13);
            drawSparkShapes(cCtx, 192, '#ff355e', 8.8, 13);
            drawSparkShapes(cCtx, 320, '#00ff85', 8.8, 13);
            drawSparkShapes(cCtx, 448, '#ff67e2', 8.8, 13);
            const sparkTex = new THREE.CanvasTexture(cC);

            const { canvas: bgC, ctx: bgCtx } = makeCanvas();
            drawBackgroundShapes(bgCtx, 64, '#ffffff');
            drawBackgroundShapes(bgCtx, 192, '#ffffff');
            drawBackgroundShapes(bgCtx, 320, '#ffffff');
            drawBackgroundShapes(bgCtx, 448, '#ffffff');
            const bgTex = new THREE.CanvasTexture(bgC);

            const mistCanvas = document.createElement('canvas');
            mistCanvas.width = 128;
            mistCanvas.height = 128;
            const mistCtx = mistCanvas.getContext('2d');
            const mistGradient = mistCtx.createRadialGradient(64, 64, 0, 64, 64, 64);
            mistGradient.addColorStop(0, 'rgba(255,255,255,0.95)');
            mistGradient.addColorStop(0.32, 'rgba(255,255,255,0.38)');
            mistGradient.addColorStop(0.65, 'rgba(255,255,255,0.1)');
            mistGradient.addColorStop(1, 'rgba(255,255,255,0)');
            mistCtx.fillStyle = mistGradient;
            mistCtx.beginPath();
            mistCtx.arc(64, 64, 64, 0, Math.PI * 2);
            mistCtx.fill();
            const mistTex = new THREE.CanvasTexture(mistCanvas);

            return { sparkTex, bgTex, mistTex };
        }

        const { sparkTex, bgTex, mistTex } = createPS5Textures();

        // =========================================================
        // 7. 背景波紋
        // =========================================================
        const bgUniforms = {
            uTime: { value: 0 },
            uTex: { value: bgTex },
            uImpacts: { value: Array.from({ length: 20 }, () => new THREE.Vector3(100, 100, 0)) },
            uImpactTimes: { value: Array(20).fill(-100) }
        };

        let bgGeometry = null;
        let bgPoints = null;
        const BG_PLANE_Z = -2;
        const MIST_PLANE_Z = -0.35;
        const RING_PLANE_Z = 0.1;
        const SPARK_PLANE_Z = 0.2;

        const bgMaterial = new THREE.ShaderMaterial({
            uniforms: bgUniforms,
            vertexShader: `
                uniform float uTime;
                uniform vec3 uImpacts[20];
                uniform float uImpactTimes[20];
                attribute float aType;
                varying float vGlow;
                varying float vType;

                void main() {
                    vType = aType;

                    float totalOsc = 0.0;
                    float brightEffect = 0.0;
                    float maxRad = 8.0;

                    for (int i = 0; i < 20; i++) {
                        float d = distance(position.xy, uImpacts[i].xy);
                        float e = uTime - uImpactTimes[i];

                        if (e > 0.0 && e < 4.0) {
                            float waveR = maxRad * smoothstep(0.0, 1.5, e);
                            float dec = exp(-e * 1.8) * exp(-d * 0.1);
                            float rip = sin(d * 3.5 - e * 15.0);
                            float m = smoothstep(2.5, 0.0, abs(d - waveR));

                            totalOsc += rip * m * dec;
                            brightEffect += m * dec * 1.0;
                        }
                    }

                    vGlow = max(0.0, brightEffect + max(0.0, totalOsc * 1.35)) * 0.9;

                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 1.18 * (1.0 + totalOsc * 1.2) * (350.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                uniform sampler2D uTex;
                varying float vGlow;
                varying float vType;

                void main() {
                    vec2 uv = gl_PointCoord;
                    uv.x = (uv.x + floor(vType)) / 4.0;
                    vec4 tex = texture2D(uTex, uv);
                    gl_FragColor = vec4(tex.rgb * vGlow, tex.a * vGlow * 0.25);
                }
            `,
            transparent: true,
            blending: THREE.NormalBlending,
            depthWrite: false
        });

        function createBgGeometry() {
            // 固定 world space 間距
            const spacing = 0.215;
            // 取得相機參數
            const aspect = window.innerWidth / window.innerHeight;
            const fov = camera.fov * Math.PI / 180;
            // 計算 z = -2 時的可見範圍（相機在 z=8）
            const camZ = camera.position.z;
            const planeZ = BG_PLANE_Z;
            const dz = camZ - planeZ;
            const viewHeight = 2 * Math.tan(fov / 2) * dz;
            const viewWidth = viewHeight * aspect;
            const xCount = Math.ceil(viewWidth / spacing) + 2;
            const yCount = Math.ceil(viewHeight / spacing) + 2;
            const xStart = -viewWidth / 2;
            const yStart = -viewHeight / 2;

            const bgPositions = [];
            const bgTypes = [];
            for (let i = 0; i < xCount; i++) {
                for (let j = 0; j < yCount; j++) {
                    const x = xStart + i * spacing;
                    const y = yStart + j * spacing;
                    bgPositions.push(x, y, planeZ);
                    bgTypes.push((i + j * 2) % 4);
                }
            }

            if (bgGeometry) bgGeometry.dispose();
            bgGeometry = new THREE.BufferGeometry();
            bgGeometry.setAttribute('position', new THREE.Float32BufferAttribute(bgPositions, 3));
            bgGeometry.setAttribute('aType', new THREE.Float32BufferAttribute(bgTypes, 1));
            return bgGeometry;
        }

        // 初始化與重建背景點
        function updateBgPoints() {
            if (bgPoints) {
                scene.remove(bgPoints);
                bgPoints.geometry.dispose();
                // material 不要 dispose，會重用
            }
            const geometry = createBgGeometry();
            bgPoints = new THREE.Points(geometry, bgMaterial);
            bgPoints.renderOrder = 0;
            scene.add(bgPoints);
            bgPoints.visible = usesLegacyGridEffects();
        }

        updateBgPoints();
        backgroundVisualsReady = true;
        syncBackgroundVisualState();


        // =========================================================
        // 8. 光圈與火花
        // =========================================================
        const activeSparks = [];
        const activeMists = [];
        let impactIdx = 0;

        function getEffectColor(midi) {
            const palette = [
                new THREE.Color(0xff7ac8),
                new THREE.Color(0xff8f70),
                new THREE.Color(0x7fffd4),
                new THREE.Color(0xffffff),
                new THREE.Color(0xb391ff)
            ];
            return palette[Math.abs(midi) % palette.length].clone();
        }

        function clearActiveSparks() {
            for (let i = activeSparks.length - 1; i >= 0; i--) {
                const s = activeSparks[i];
                scene.remove(s.points);
                s.geo.dispose();
                s.points.material.dispose();
            }
            activeSparks.length = 0;
        }

        function clearActiveMists() {
            for (let i = activeMists.length - 1; i >= 0; i--) {
                const m = activeMists[i];
                scene.remove(m.points);
                m.geo.dispose();
                m.points.material.dispose();
            }
            activeMists.length = 0;
        }

        function syncBackgroundVisualState() {
            const showLegacyEffects = usesLegacyGridEffects();

            if (bgPoints) {
                bgPoints.visible = showLegacyEffects;
            }

            if (!showLegacyEffects) {
                bgUniforms.uImpactTimes.value.fill(-100);
                clearActiveSparks();
                clearActiveMists();
            }
        }

        function triggerInteraction(source, bgPoint, midi) {
            if (usesLegacyGridEffects()) {
                bgUniforms.uImpacts.value[impactIdx].set(bgPoint.x, bgPoint.y, 0);
                bgUniforms.uImpactTimes.value[impactIdx] = performance.now() * 0.001;
                impactIdx = (impactIdx + 1) % 20;
            }

            highlightKey(source, midi, true);
            setTimeout(() => highlightKey(source, midi, false), 150);
        }

        function spawnSparks(point) {
            if (!usesLegacyGridEffects()) return;

            const count = 8;

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const vel = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const alphas = new Float32Array(count);
            const types = new Float32Array(count);
            const rx = new Float32Array(count);
            const ry = new Float32Array(count);
            const rz = new Float32Array(count);
            const rvx = new Float32Array(count);
            const rvy = new Float32Array(count);
            const rvz = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                pos[i * 3] = point.x;
                pos[i * 3 + 1] = point.y;
                pos[i * 3 + 2] = SPARK_PLANE_Z;

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 0.05 + 0.05;

                vel[i * 3] = Math.cos(angle) * speed;
                vel[i * 3 + 1] = Math.sin(angle) * speed;
                vel[i * 3 + 2] = (Math.random() - 0.5) * 0.01;

                sizes[i] = 2.6 + Math.random() * 1.4;
                alphas[i] = 1.5;
                types[i] = Math.floor(Math.random() * 4);

                rx[i] = Math.random() * Math.PI * 2;
                ry[i] = Math.random() * Math.PI * 2;
                rz[i] = Math.random() * Math.PI * 2;

                rvx[i] = (Math.random() - 0.5) * 0.18;
                rvy[i] = (Math.random() - 0.5) * 0.18;
                rvz[i] = (Math.random() - 0.5) * 0.18;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
            geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
            geo.setAttribute('aType', new THREE.BufferAttribute(types, 1));
            geo.setAttribute('aRotX', new THREE.BufferAttribute(rx, 1));
            geo.setAttribute('aRotY', new THREE.BufferAttribute(ry, 1));
            geo.setAttribute('aRotZ', new THREE.BufferAttribute(rz, 1));

            const points = new THREE.Points(
                geo,
                new THREE.ShaderMaterial({
                    uniforms: { uTex: { value: sparkTex } },
                    vertexShader: `
                        attribute float aSize;
                        attribute float aAlpha;
                        attribute float aType;
                        attribute float aRotX;
                        attribute float aRotY;
                        attribute float aRotZ;

                        varying float vAlpha;
                        varying float vType;
                        varying float vRotX;
                        varying float vRotY;
                        varying float vRotZ;

                        void main() {
                            vAlpha = aAlpha;
                            vType = aType;
                            vRotX = aRotX;
                            vRotY = aRotY;
                            vRotZ = aRotZ;

                            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                            gl_PointSize = aSize * (0.3 + 0.7 * aAlpha) * (350.0 / -mvPos.z);
                            gl_Position = projectionMatrix * mvPos;
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D uTex;

                        varying float vAlpha;
                        varying float vType;
                        varying float vRotX;
                        varying float vRotY;
                        varying float vRotZ;

                        void main() {
                            vec2 uv = gl_PointCoord - vec2(0.5);

                            float cY = cos(vRotY);
                            float cX = cos(vRotX);
                            float sZ = sin(vRotZ);
                            float cZ = cos(vRotZ);

                            // Z 軸旋轉
                            vec2 rotUV = vec2(
                                uv.x * cZ - uv.y * sZ,
                                uv.x * sZ + uv.y * cZ
                            );

                            vec2 rUV = rotUV;
                            rUV.x /= (abs(cY) < 0.15 ? 0.15 : cY);
                            rUV.y /= (abs(cX) < 0.15 ? 0.15 : cX);

                            if (abs(rUV.x) > 0.5 || abs(rUV.y) > 0.5) discard;

                            vec2 finalUV = rUV + 0.5;
                            finalUV.x = (finalUV.x + floor(vType + 0.5)) / 4.0;

                            vec4 texColor = texture2D(uTex, finalUV);
                            gl_FragColor = vec4(texColor.rgb, texColor.a * vAlpha);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            points.renderOrder = 2;
            scene.add(points);

            activeSparks.push({
                points,
                geo,
                pos,
                vel,
                alphas,
                rx,
                ry,
                rz,
                rvx,
                rvy,
                rvz,
                posAttr: geo.attributes.position,
                alphaAttr: geo.attributes.aAlpha,
                rotXAttr: geo.attributes.aRotX,
                rotYAttr: geo.attributes.aRotY,
                rotZAttr: geo.attributes.aRotZ
            });
        }

        function spawnMist(point, midi) {
            if (!usesLegacyGridEffects()) return;

            const count = 3;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const drift = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const alphas = new Float32Array(count);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 0.28;
                const color = getEffectColor(midi);
                color.lerp(new THREE.Color(0x6f8cff), 0.22 + Math.random() * 0.16);

                pos[i * 3] = point.x + Math.cos(angle) * radius;
                pos[i * 3 + 1] = point.y + Math.sin(angle) * radius;
                pos[i * 3 + 2] = MIST_PLANE_Z;

                drift[i * 3] = (Math.random() - 0.5) * 0.0035;
                drift[i * 3 + 1] = 0.002 + Math.random() * 0.003;
                drift[i * 3 + 2] = 0;

                sizes[i] = 34 + Math.random() * 24;
                alphas[i] = 0.12 + Math.random() * 0.1;
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
            geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
            geo.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));

            const points = new THREE.Points(
                geo,
                new THREE.ShaderMaterial({
                    uniforms: { uTex: { value: mistTex } },
                    vertexShader: `
                        attribute float aSize;
                        attribute float aAlpha;
                        attribute vec3 aColor;
                        varying float vAlpha;
                        varying vec3 vColor;

                        void main() {
                            vAlpha = aAlpha;
                            vColor = aColor;
                            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                            gl_PointSize = aSize * (350.0 / -mvPos.z);
                            gl_Position = projectionMatrix * mvPos;
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D uTex;
                        varying float vAlpha;
                        varying vec3 vColor;

                        void main() {
                            vec4 tex = texture2D(uTex, gl_PointCoord);
                            gl_FragColor = vec4(vColor * tex.rgb, tex.a * vAlpha);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            points.renderOrder = 1;
            scene.add(points);

            activeMists.push({
                points,
                geo,
                pos,
                drift,
                alphas,
                alphaAttr: geo.attributes.aAlpha,
                posAttr: geo.attributes.position
            });
        }

        // =========================================================
        // 9. 鍵盤座標對應
        // =========================================================
        function getKeyVisualPosition(key) {
            const row = "qwertyuiop".includes(key)
                ? "qwertyuiop"
                : "asdfghjkl".includes(key)
                    ? "asdfghjkl"
                    : "zxcvbnm";

            const x = (row.indexOf(key) / (row.length - 1)) * 12 - 6;
            const y = row === "qwertyuiop" ? 2.5 : row === "zxcvbnm" ? -2.5 : 0;

            return { x, y };
        }

        function getScreenPointOnPlane(clientX, clientY, targetZ) {
            const mouse = new THREE.Vector2(
                (clientX / window.innerWidth) * 2 - 1,
                -(clientY / window.innerHeight) * 2 + 1
            );

            const ray = new THREE.Raycaster();
            ray.setFromCamera(mouse, camera);

            const point = new THREE.Vector3();
            const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -targetZ);
            ray.ray.intersectPlane(plane, point);
            return point;
        }

        function projectPointToPlane(sourcePoint, targetZ) {
            const direction = sourcePoint.clone().sub(camera.position);
            const scale = (targetZ - camera.position.z) / direction.z;
            return camera.position.clone().add(direction.multiplyScalar(scale));
        }

        // =========================================================
        // 10. 鍵盤互動
        // =========================================================
        window.addEventListener('keydown', async (e) => {
            if (!isInteractivePlayback()) {
                if (currentScreen === 'home' && e.key === 'Enter') {
                    setScreen('free-play');
                }
                return;
            }

            const key = e.key.toLowerCase();
            const midi = getMidiFromScaleKey(key, e.shiftKey, e.ctrlKey);

            if (midi !== null) {
                e.preventDefault();
                if (e.repeat) return;

                try {
                    await initAudio();
                    const { x, y } = getKeyVisualPosition(key);
                    const sustained = currentSound === 'piano';
                    playVisualFeedback('user', midi, x, y);
                    recordPerformanceEvent({ type: 'note-on', midi, ringX: x, ringY: y, sustained });

                    if (currentSound === 'piano') {
                        playPianoKeyDown(key, midi);
                    } else {
                        playMidi(midi);
                    }
                } catch (err) {
                    console.error('Audio init/play failed:', err);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (!isInteractivePlayback()) return;

            const key = e.key.toLowerCase();

            if (currentSound === 'piano' && activePianoKeyStates.has(key)) {
                const state = activePianoKeyStates.get(key);
                if (state) {
                    recordPerformanceEvent({ type: 'note-off', midi: state.midi });
                }
                releasePianoKey(key);
            }
        });

        window.addEventListener('mousedown', async (e) => {
            if (!isInteractivePlayback()) return;

            const topBar = document.getElementById('top-bar');
            const rect = bottomUi.getBoundingClientRect();
            const topBarRect = topBar.getBoundingClientRect();

            if (
                (
                    e.clientX >= rect.left &&
                    e.clientX <= rect.right &&
                    e.clientY >= rect.top &&
                    e.clientY <= rect.bottom
                ) ||
                (
                    e.clientX >= topBarRect.left &&
                    e.clientX <= topBarRect.right &&
                    e.clientY >= topBarRect.top &&
                    e.clientY <= topBarRect.bottom
                )
            ) {
                return;
            }

            try {
                await initAudio();

                const midi = getMidiFromScaleKey('a', false, false) ?? 60;
                const ringPoint = getScreenPointOnPlane(e.clientX, e.clientY, RING_PLANE_Z);
                playVisualFeedback('user', midi, ringPoint.x, ringPoint.y);
                recordPerformanceEvent({ type: 'note-on', midi, ringX: ringPoint.x, ringY: ringPoint.y, sustained: false });
                playMidi(midi);
            } catch (err) {
                console.error('Mouse audio init/play failed:', err);
            }
        });

        // =========================================================
        // 11. 動畫循環
        // =========================================================
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now() * 0.001;
            bgUniforms.uTime.value = now;

            for (let i = activeSparks.length - 1; i >= 0; i--) {
                const s = activeSparks[i];
                let alive = 0;

                for (let j = 0; j < s.alphas.length; j++) {
                    if (s.alphas[j] > 0.01) {
                        s.pos[j * 3] += s.vel[j * 3];
                        s.pos[j * 3 + 1] += s.vel[j * 3 + 1];
                        s.pos[j * 3 + 2] += s.vel[j * 3 + 2];

                        s.vel[j * 3] *= 0.98;
                        s.vel[j * 3 + 1] *= 0.98;
                        s.vel[j * 3 + 2] *= 0.985;

                        s.rx[j] += s.rvx[j];
                        s.ry[j] += s.rvy[j];
                        s.rz[j] += s.rvz[j];

                        s.rvx[j] *= 0.992;
                        s.rvy[j] *= 0.992;
                        s.rvz[j] *= 0.992;

                        s.alphas[j] *= 0.975;
                        alive++;
                    }
                }

                s.posAttr.needsUpdate = true;
                s.alphaAttr.needsUpdate = true;
                s.rotXAttr.needsUpdate = true;
                s.rotYAttr.needsUpdate = true;
                s.rotZAttr.needsUpdate = true;

                if (alive === 0) {
                    scene.remove(s.points);
                    s.geo.dispose();
                    s.points.material.dispose();
                    activeSparks.splice(i, 1);
                }
            }

            for (let i = activeMists.length - 1; i >= 0; i--) {
                const m = activeMists[i];
                let alive = 0;

                for (let j = 0; j < m.alphas.length; j++) {
                    if (m.alphas[j] > 0.008) {
                        m.pos[j * 3] += m.drift[j * 3];
                        m.pos[j * 3 + 1] += m.drift[j * 3 + 1];
                        m.drift[j * 3] *= 0.992;
                        m.drift[j * 3 + 1] *= 0.996;
                        m.alphas[j] *= 0.975;
                        alive++;
                    }
                }

                m.posAttr.needsUpdate = true;
                m.alphaAttr.needsUpdate = true;

                if (alive === 0) {
                    scene.remove(m.points);
                    m.geo.dispose();
                    m.points.material.dispose();
                    activeMists.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateBgPoints();
        });
    </script>
</body>
</html>
