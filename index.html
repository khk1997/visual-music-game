<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MIDI Visual - Orchestral Harp</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            cursor: crosshair;
            font-family: sans-serif;
        }

        #bottom-ui {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 86%;
            height: 124px;
            display: flex;
            gap: 12px;
            z-index: 100;
            pointer-events: auto;
            align-items: stretch;
        }

        #key-panel {
            width: 230px;
            height: 100%;
            background: rgba(10, 15, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 11px 10px 11px;
            box-sizing: border-box;
            box-shadow:
                0 15px 40px rgba(0,0,0,0.9),
                0 0 20px rgba(0,210,255,0.05);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        #current-key-label {
            font-size: 15px;
            font-weight: 700;
            color: #00d2ff;
            margin-bottom: 6px;
            line-height: 1.05;
        }

        #key-hint {
            font-size: 8px;
            line-height: 1.15;
            color: rgba(255,255,255,0.68);
            margin-bottom: 10px;
        }

        .single-row {
            display: flex;
            margin-bottom: 10px;
        }

        .control-row {
            display: flex;
            gap: 6px;
            margin-top: 0;
        }

        .custom-select {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .custom-select select {
            width: 100%;
            height: 28px;
            position: static;
            left: unset;
            top: unset;
            z-index: 1;
            background: rgba(255,255,255,0.06);
            padding-right: 28px;
        }

        #sound-select,
        #key-select,
        #mode-select {
            flex: 1;
            height: 28px;
            padding: 0 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.06);
            color: #fff;
            outline: none;
            font-size: 10px;
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            padding-right: 28px; /* 預留箭頭空間 */
        }

        /* 自訂下拉箭頭 */
        .custom-select::after {
            content: '';
            position: absolute;
            top: 50%;
            right: 12px;
            width: 8px;
            height: 8px;
            pointer-events: none;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: translateY(-60%) rotate(-45deg);
            opacity: 0.7;
            z-index: 2;
        }

        /* 讓 option 也盡量維持白字深底，雖然部分瀏覽器不支援 */
        #sound-select option,
        #key-select option,
        #mode-select option {
            background: #222;
            color: #fff;
        }

        #piano-container {
            flex: 1;
            height: 100%;
            background: rgba(10, 15, 25, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 6px;
            box-sizing: border-box;
            box-shadow:
                0 15px 40px rgba(0,0,0,0.9),
                0 0 20px rgba(0,210,255,0.05);
            display: flex;
            overflow: hidden;
        }

        #piano-ui {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .key.white {
            flex: 1 0 1.923%;
            height: 100%;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            box-sizing: border-box;
            z-index: 1;
            transition: background 0.1s;
        }

        .key.black {
            flex: 0 0 1.2%;
            height: 60%;
            background: #222;
            border: 1px solid #000;
            margin-left: -0.6%;
            margin-right: -0.6%;
            z-index: 2;
            border-radius: 0 0 3px 3px;
            transition: background 0.1s;
        }

        .key.active {
            background: #00d2ff !important;
            box-shadow: 0 0 20px #00d2ff;
            border-color: #00d2ff;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
</head>
<body>
    <div id="bottom-ui">
        <div id="key-panel">
            <div id="current-key-label">C Major</div>

            <div id="key-hint">Shift：升半音 / Ctrl：降半音</div>

            <div class="single-row custom-select">
                <select id="sound-select">
                    <option value="synth">Synth</option>
                    <option value="piano">Piano</option>
                    <option value="harp">Harp</option>
                    <option value="bell">Bell</option>
                    <option value="marimba_kalimba">Marimba/Kalimba</option>
                    <option value="chiptune_lead">Chiptune Lead</option>
                    <option value="lofi_ep">Lo-fi EP</option>
                </select>
            </div>

            <div class="control-row">
                <div class="custom-select" style="flex:1;">
                    <select id="key-select">
                        <option value="C">C</option>
                        <option value="C#">C#</option>
                        <option value="D">D</option>
                        <option value="Eb">Eb</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="F#">F#</option>
                        <option value="G">G</option>
                        <option value="Ab">Ab</option>
                        <option value="A">A</option>
                        <option value="Bb">Bb</option>
                        <option value="B">B</option>
                    </select>
                </div>
                <div class="custom-select" style="flex:1;">
                    <select id="mode-select">
                        <option value="major">Major</option>
                        <option value="minor">Minor</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="piano-container">
            <div id="piano-ui"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // =========================================================
        // 1. 音源設定
        // =========================================================
        let instrument = null;
        let reverb = null;
        let limiter = null;
        let audioStarted = false;
        let currentSound = 'synth';
        let lofiVibrato = null;
        let lofiFilter = null;
        const activePianoKeyStates = new Map();
        const PIANO_TAP_DURATION = 0.12;

        const soundSelect = document.getElementById('sound-select');

        // 各音色音量（單位：dB）
        const INSTRUMENT_VOLUMES = {
            synth: 0,
            piano: 3,
            harp: 10,
            bell: 0,
            marimba_kalimba: 2,
            chiptune_lead: -1,
            lofi_ep: -2
        };

        const PIANO_SAMPLE_CONFIG = {
            urls: {
                A1: "A1.mp3",
                C2: "C2.mp3",
                "D#2": "Ds2.mp3",
                "F#2": "Fs2.mp3",
                A2: "A2.mp3",
                C3: "C3.mp3",
                "D#3": "Ds3.mp3",
                "F#3": "Fs3.mp3",
                A3: "A3.mp3",
                C4: "C4.mp3",
                "D#4": "Ds4.mp3",
                "F#4": "Fs4.mp3",
                A4: "A4.mp3",
                C5: "C5.mp3",
                "D#5": "Ds5.mp3",
                "F#5": "Fs5.mp3",
                A5: "A5.mp3",
                C6: "C6.mp3",
                "D#6": "Ds6.mp3",
                "F#6": "Fs6.mp3",
                A6: "A6.mp3",
                C7: "C7.mp3",
                "D#7": "Ds7.mp3",
                "F#7": "Fs7.mp3",
                A7: "A7.mp3",
                C8: "C8.mp3"
            },
            baseUrl: "https://tonejs.github.io/audio/salamander/"
        };

        const HARP_SAMPLE_CONFIG = {
            urls: {
                A2: "A2.wav",
                C3: "C3.wav",
                E3: "E3.wav",
                A4: "A4.wav",
                C5: "C5.wav",
                E5: "E5.wav",
                A6: "A6.wav"
            },
            baseUrl: "./harp/"
        };
        const PIANO_RELEASE = 0.18;
        const LOW_LATENCY_CONFIG = {
            lookAhead: 0.005,
            updateInterval: 0.01
        };

        function getToneContext() {
            if (typeof Tone.getContext === 'function') return Tone.getContext();
            return Tone.context;
        }

        function applyLowLatencyMode() {
            const toneContext = getToneContext();
            if (toneContext) {
                toneContext.lookAhead = LOW_LATENCY_CONFIG.lookAhead;
                toneContext.updateInterval = LOW_LATENCY_CONFIG.updateInterval;
            }
        }

        function getTriggerTime() {
            if (typeof Tone.immediate === 'function') {
                return Tone.immediate();
            }
            return Tone.now();
        }

        function applyInstrumentVolume(type) {
            if (!instrument || !instrument.volume) return;
            instrument.volume.value = INSTRUMENT_VOLUMES[type] ?? 0;
        }

        function disposeLofiChain() {
            if (lofiVibrato && typeof lofiVibrato.dispose === 'function') {
                lofiVibrato.dispose();
            }
            if (lofiFilter && typeof lofiFilter.dispose === 'function') {
                lofiFilter.dispose();
            }
            lofiVibrato = null;
            lofiFilter = null;
        }

        function disposeCurrentInstrument() {
            disposeLofiChain();
            if (instrument && typeof instrument.dispose === 'function') {
                instrument.dispose();
            }
            instrument = null;
            activePianoKeyStates.clear();
        }

        async function createPianoInstrument() {
            disposeCurrentInstrument();

            instrument = new Tone.Sampler({
                urls: PIANO_SAMPLE_CONFIG.urls,
                baseUrl: PIANO_SAMPLE_CONFIG.baseUrl,
                release: PIANO_RELEASE
            }).connect(reverb);

            await Tone.loaded();
            applyInstrumentVolume('piano');
        }

        async function createHarpInstrument() {
            disposeCurrentInstrument();

            instrument = new Tone.Sampler({
                urls: HARP_SAMPLE_CONFIG.urls,
                baseUrl: HARP_SAMPLE_CONFIG.baseUrl
            }).connect(reverb);

            await Tone.loaded();
            applyInstrumentVolume('harp');
        }

        async function createInstrument(type) {
            if (type === 'synth') {
                disposeCurrentInstrument();

                instrument = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: {
                        attack: 0.005,
                        decay: 0.1,
                        sustain: 0.3,
                        release: 1.2
                    }
                }).connect(reverb);

                applyInstrumentVolume('synth');
            }
            else if (type === 'bell') {
                disposeCurrentInstrument();

                instrument = new Tone.PolySynth(Tone.FMSynth, {
                    harmonicity: 8,
                    modulationIndex: 12,
                    envelope: {
                        attack: 0.001,
                        decay: 1.2,
                        sustain: 0,
                        release: 1.5
                    },
                    modulation: {
                        type: "sine"
                    },
                    modulationEnvelope: {
                        attack: 0.002,
                        decay: 0.3,
                        sustain: 0,
                        release: 0.8
                    }
                }).connect(reverb);

                applyInstrumentVolume('bell');
            }
            else if (type === 'marimba_kalimba') {
                disposeCurrentInstrument();

                instrument = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle8" },
                    envelope: {
                        attack: 0.001,
                        decay: 0.22,
                        sustain: 0.0,
                        release: 0.28
                    }
                }).connect(reverb);

                applyInstrumentVolume('marimba_kalimba');
            }
            else if (type === 'chiptune_lead') {
                disposeCurrentInstrument();

                instrument = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "square" },
                    envelope: {
                        attack: 0.002,
                        decay: 0.08,
                        sustain: 0.45,
                        release: 0.12
                    }
                }).connect(reverb);

                applyInstrumentVolume('chiptune_lead');
            }
            else if (type === 'lofi_ep') {
                disposeCurrentInstrument();

                instrument = new Tone.PolySynth(Tone.FMSynth, {
                    harmonicity: 1.5,
                    modulationIndex: 3.5,
                    detune: 0,
                    oscillator: { type: "triangle" },
                    envelope: {
                        attack: 0.015,
                        decay: 0.35,
                        sustain: 0.28,
                        release: 1.1
                    },
                    modulation: { type: "sine" },
                    modulationEnvelope: {
                        attack: 0.02,
                        decay: 0.2,
                        sustain: 0.0,
                        release: 0.6
                    }
                });

                lofiVibrato = new Tone.Vibrato({
                    frequency: 4.2,
                    depth: 0.08,
                    type: "sine"
                });
                lofiFilter = new Tone.Filter({
                    type: "lowpass",
                    frequency: 3600,
                    rolloff: -24,
                    Q: 0.8
                });

                instrument.chain(lofiVibrato, lofiFilter, reverb);
                applyInstrumentVolume('lofi_ep');
            }
            else if (type === 'piano') {
                await createPianoInstrument();
            }
            else if (type === 'harp') {
                await createHarpInstrument();
            }

            currentSound = type;
        }

        async function initAudio() {
            if (audioStarted) return;

            await Tone.start();
            applyLowLatencyMode();

            limiter = new Tone.Limiter(-1).toDestination();
            reverb = new Tone.Reverb({
                decay: 2.5,
                wet: 0.3
            }).connect(limiter);

            await createInstrument(currentSound);
            audioStarted = true;
        }

        soundSelect.addEventListener('change', async () => {
            currentSound = soundSelect.value;

            if (!audioStarted) return;

            try {
                await createInstrument(currentSound);
            } catch (err) {
                console.error('Failed to switch instrument:', err);
            }
        });

        function playMidi(midi) {
            if (!instrument) return;

            const note = Tone.Frequency(midi, "midi").toNote();
            const triggerTime = getTriggerTime();

            if (currentSound === 'piano') {
                instrument.triggerAttackRelease(note, 1.4, triggerTime);
            } else if (currentSound === 'harp') {
                instrument.triggerAttackRelease(note, 2.0, triggerTime);
            } else if (currentSound === 'bell') {
                instrument.triggerAttackRelease(note, "2n", triggerTime);
            } else if (currentSound === 'marimba_kalimba') {
                instrument.triggerAttackRelease(note, "8n", triggerTime);
            } else if (currentSound === 'chiptune_lead') {
                instrument.triggerAttackRelease(note, "16n", triggerTime);
            } else if (currentSound === 'lofi_ep') {
                instrument.triggerAttackRelease(note, "4n", triggerTime);
            } else {
                instrument.triggerAttackRelease(note, "8n", triggerTime);
            }
        }

        function playPianoKeyDown(key, midi) {
            if (!instrument || currentSound !== 'piano' || activePianoKeyStates.has(key)) return;

            const note = Tone.Frequency(midi, "midi").toNote();
            const startTime = getTriggerTime();

            instrument.triggerAttack(note, startTime);
            activePianoKeyStates.set(key, { note, startTime });
        }

        function releasePianoKey(key) {
            if (!instrument) return;

            const state = activePianoKeyStates.get(key);
            if (!state) return;

            const now = getTriggerTime();
            const heldFor = now - state.startTime;
            const releaseTime = heldFor < PIANO_TAP_DURATION
                ? now + (PIANO_TAP_DURATION - heldFor)
                : now;

            instrument.triggerRelease(state.note, releaseTime);
            activePianoKeyStates.delete(key);
        }

        // =========================================================
        // 2. 鋼琴 UI
        // =========================================================
        const pianoUi = document.getElementById('piano-ui');
        const allKeysMap = {};

        function createPianoKeys() {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

            for (let midi = 21; midi <= 108; midi++) {
                const key = document.createElement('div');
                key.className = notes[midi % 12].includes('#') ? 'key black' : 'key white';
                pianoUi.appendChild(key);
                allKeysMap[midi] = key;
            }
        }

        createPianoKeys();

        function highlightKey(midi, active) {
            if (!allKeysMap[midi]) return;
            if (active) allKeysMap[midi].classList.add('active');
            else allKeysMap[midi].classList.remove('active');
        }

        // =========================================================
        // 3. 調性系統
        // =========================================================
        const keySelect = document.getElementById('key-select');
        const modeSelect = document.getElementById('mode-select');
        const currentKeyLabel = document.getElementById('current-key-label');

        const NOTE_TO_PC = {
            'C': 0, 'C#': 1, 'Db': 1, 'D': 2, 'D#': 3, 'Eb': 3,
            'E': 4, 'F': 5, 'F#': 6, 'Gb': 6, 'G': 7, 'G#': 8,
            'Ab': 8, 'A': 9, 'A#': 10, 'Bb': 10, 'B': 11
        };

        const MAJOR_SCALE = [0, 2, 4, 5, 7, 9, 11];
        const NATURAL_MINOR_SCALE = [0, 2, 3, 5, 7, 8, 10];

        let currentKeyRoot = 'C';
        let currentMode = 'major';

        function getCurrentScale() {
            return currentMode === 'major' ? MAJOR_SCALE : NATURAL_MINOR_SCALE;
        }

        function updateKeyUI() {
            const modeText = currentMode === 'major' ? 'Major' : 'Minor';
            currentKeyLabel.textContent = `${currentKeyRoot} ${modeText}`;
            keySelect.value = currentKeyRoot;
            modeSelect.value = currentMode;
        }

        keySelect.addEventListener('change', () => {
            currentKeyRoot = keySelect.value;
            updateKeyUI();
        });

        modeSelect.addEventListener('change', () => {
            currentMode = modeSelect.value;
            updateKeyUI();
        });

        updateKeyUI();

        // =========================================================
        // 4. 鍵位映射
        // =========================================================
        const scaleKeyMap = {
            'z': { degree: 0, octaveBase: 48 },
            'x': { degree: 1, octaveBase: 48 },
            'c': { degree: 2, octaveBase: 48 },
            'v': { degree: 3, octaveBase: 48 },
            'b': { degree: 4, octaveBase: 48 },
            'n': { degree: 5, octaveBase: 48 },
            'm': { degree: 6, octaveBase: 48 },

            'a': { degree: 0, octaveBase: 60 },
            's': { degree: 1, octaveBase: 60 },
            'd': { degree: 2, octaveBase: 60 },
            'f': { degree: 3, octaveBase: 60 },
            'g': { degree: 4, octaveBase: 60 },
            'h': { degree: 5, octaveBase: 60 },
            'j': { degree: 6, octaveBase: 60 },
            'k': { degree: 0, octaveBase: 72 },
            'l': { degree: 1, octaveBase: 72 },

            'q': { degree: 0, octaveBase: 72 },
            'w': { degree: 1, octaveBase: 72 },
            'e': { degree: 2, octaveBase: 72 },
            'r': { degree: 3, octaveBase: 72 },
            't': { degree: 4, octaveBase: 72 },
            'y': { degree: 5, octaveBase: 72 },
            'u': { degree: 6, octaveBase: 72 },
            'i': { degree: 0, octaveBase: 84 },
            'o': { degree: 1, octaveBase: 84 },
            'p': { degree: 2, octaveBase: 84 }
        };

        function getMidiFromScaleKey(key, shiftKey, ctrlKey) {
            const info = scaleKeyMap[key];
            if (!info) return null;

            const rootPc = NOTE_TO_PC[currentKeyRoot];
            const scale = getCurrentScale();
            const baseCMidi = info.octaveBase;
            const rootMidi = baseCMidi + rootPc;

            let midi = rootMidi + scale[info.degree];

            if (shiftKey) midi += 1;
            if (ctrlKey) midi -= 1;

            return Math.max(21, Math.min(108, midi));
        }

        // =========================================================
        // 5. 視覺場景
        // =========================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020a12);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 2.0;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        // =========================================================
        // 6. 貼圖生成
        // =========================================================
        function createPS5Textures() {
            function makeCanvas() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.lineCap = 'round';
                return { canvas, ctx };
            }

            function drawShapes(ctx, x, c, lw, sb) {
                ctx.save();
                ctx.translate(x, 64);
                ctx.shadowColor = c;
                ctx.shadowBlur = sb;
                ctx.strokeStyle = c;
                ctx.lineWidth = lw;

                if (x === 64) {
                    ctx.beginPath();
                    ctx.moveTo(-30, -30);
                    ctx.lineTo(30, 30);
                    ctx.moveTo(30, -30);
                    ctx.lineTo(-30, 30);
                    ctx.stroke();
                }
                if (x === 192) {
                    ctx.beginPath();
                    ctx.arc(0, 0, 35, 0, Math.PI * 2);
                    ctx.stroke();
                }
                if (x === 320) {
                    ctx.beginPath();
                    ctx.moveTo(0, -35);
                    ctx.lineTo(-35, 30);
                    ctx.lineTo(35, 30);
                    ctx.closePath();
                    ctx.stroke();
                }
                if (x === 448) {
                    ctx.beginPath();
                    ctx.rect(-30, -30, 60, 60);
                    ctx.stroke();
                }

                ctx.restore();
            }

            const { canvas: cC, ctx: cCtx } = makeCanvas();
            drawShapes(cCtx, 64, '#00d2ff', 8, 10);
            drawShapes(cCtx, 192, '#ff355e', 8, 10);
            drawShapes(cCtx, 320, '#00ff85', 8, 10);
            drawShapes(cCtx, 448, '#ff67e2', 8, 10);
            const colorTex = new THREE.CanvasTexture(cC);

            const { canvas: wC, ctx: wCtx } = makeCanvas();
            drawShapes(wCtx, 64, '#ffffff', 2.5, 4);
            drawShapes(wCtx, 192, '#ffffff', 2.5, 4);
            drawShapes(wCtx, 320, '#ffffff', 2.5, 4);
            drawShapes(wCtx, 448, '#ffffff', 2.5, 4);
            const whiteTex = new THREE.CanvasTexture(wC);

            return { colorTex, whiteTex };
        }

        const { colorTex, whiteTex } = createPS5Textures();

        // =========================================================
        // 7. 背景波紋
        // =========================================================
        const bgUniforms = {
            uTime: { value: 0 },
            uTex: { value: whiteTex },
            uImpacts: { value: Array.from({ length: 20 }, () => new THREE.Vector3(100, 100, 0)) },
            uImpactTimes: { value: Array(20).fill(-100) }
        };

        let bgGeometry = null;
        let bgPoints = null;
        const BG_PLANE_Z = -2;
        const RING_PLANE_Z = 0.1;
        const SPARK_PLANE_Z = 0.2;

        const bgMaterial = new THREE.ShaderMaterial({
            uniforms: bgUniforms,
            vertexShader: `
                uniform float uTime;
                uniform vec3 uImpacts[20];
                uniform float uImpactTimes[20];
                attribute float aType;
                varying float vGlow;
                varying float vType;

                void main() {
                    vType = aType;

                    float totalOsc = 0.0;
                    float brightEffect = 0.0;
                    float maxRad = 8.0;

                    for (int i = 0; i < 20; i++) {
                        float d = distance(position.xy, uImpacts[i].xy);
                        float e = uTime - uImpactTimes[i];

                        if (e > 0.0 && e < 4.0) {
                            float waveR = maxRad * smoothstep(0.0, 1.5, e);
                            float dec = exp(-e * 1.8) * exp(-d * 0.1);
                            float rip = sin(d * 3.5 - e * 15.0);
                            float m = smoothstep(2.5, 0.0, abs(d - waveR));

                            totalOsc += rip * m * dec;
                            brightEffect += m * dec * 1.6;
                        }
                    }

                    vGlow = (0.12 + brightEffect + max(0.0, totalOsc * 2.0)) * 1.2;

                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 1.18 * (1.0 + totalOsc * 1.2) * (350.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                uniform sampler2D uTex;
                varying float vGlow;
                varying float vType;

                void main() {
                    vec2 uv = gl_PointCoord;
                    uv.x = (uv.x + floor(vType)) / 4.0;
                    vec4 tex = texture2D(uTex, uv);
                    gl_FragColor = vec4(tex.rgb * vGlow, tex.a * 0.25);
                }
            `,
            transparent: true,
            blending: THREE.NormalBlending,
            depthWrite: false
        });

        function createBgGeometry() {
            // 固定 world space 間距
            const spacing = 0.35;
            // 取得相機參數
            const aspect = window.innerWidth / window.innerHeight;
            const fov = camera.fov * Math.PI / 180;
            // 計算 z = -2 時的可見範圍（相機在 z=8）
            const camZ = camera.position.z;
            const planeZ = BG_PLANE_Z;
            const dz = camZ - planeZ;
            const viewHeight = 2 * Math.tan(fov / 2) * dz;
            const viewWidth = viewHeight * aspect;
            const xCount = Math.ceil(viewWidth / spacing) + 2;
            const yCount = Math.ceil(viewHeight / spacing) + 2;
            const xStart = -viewWidth / 2;
            const yStart = -viewHeight / 2;

            const bgPositions = [];
            const bgTypes = [];
            for (let i = 0; i < xCount; i++) {
                for (let j = 0; j < yCount; j++) {
                    const x = xStart + i * spacing;
                    const y = yStart + j * spacing;
                    bgPositions.push(x, y, planeZ);
                    bgTypes.push((i + j * 2) % 4);
                }
            }

            if (bgGeometry) bgGeometry.dispose();
            bgGeometry = new THREE.BufferGeometry();
            bgGeometry.setAttribute('position', new THREE.Float32BufferAttribute(bgPositions, 3));
            bgGeometry.setAttribute('aType', new THREE.Float32BufferAttribute(bgTypes, 1));
            return bgGeometry;
        }

        // 初始化與重建背景點
        function updateBgPoints() {
            if (bgPoints) {
                scene.remove(bgPoints);
                bgPoints.geometry.dispose();
                // material 不要 dispose，會重用
            }
            const geometry = createBgGeometry();
            bgPoints = new THREE.Points(geometry, bgMaterial);
            bgPoints.renderOrder = 0;
            scene.add(bgPoints);
        }

        updateBgPoints();


        // =========================================================
        // 8. 光圈與火花
        // =========================================================
        const activeRings = [];
        const activeSparks = [];
        let impactIdx = 0;

        function triggerInteraction(bgPoint, ringPoint, midi) {
            bgUniforms.uImpacts.value[impactIdx].set(bgPoint.x, bgPoint.y, 0);
            bgUniforms.uImpactTimes.value[impactIdx] = performance.now() * 0.001;
            impactIdx = (impactIdx + 1) % 20;

            const ringUniforms = {
                u_time: { value: 0 },
                u_intensity: { value: 1.0 },
                u_color: { value: new THREE.Color().setHSL(Math.random(), 0.8, 0.6) }
            };

            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(3, 3),
                new THREE.ShaderMaterial({
                    uniforms: ringUniforms,
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float u_time;
                        uniform float u_intensity;
                        uniform vec3 u_color;
                        varying vec2 vUv;

                        void main() {
                            vec2 uv = vUv - 0.5;
                            float d = length(uv);
                            float ring = 0.01 / abs(d + sin(d * 20.0 - u_time * 5.0) * 0.02 - u_intensity * 0.4);
                            float fade = smoothstep(0.5, 0.1, d);
                            gl_FragColor = vec4(u_color * ring * fade * u_intensity, 1.0);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            mesh.position.set(ringPoint.x, ringPoint.y, RING_PLANE_Z);
            mesh.renderOrder = 1;
            scene.add(mesh);
            activeRings.push({ mesh, uniforms: ringUniforms });

            highlightKey(midi, true);
            setTimeout(() => highlightKey(midi, false), 150);
        }

        function spawnSparks(point) {
            const count = 8;

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const vel = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            const alphas = new Float32Array(count);
            const types = new Float32Array(count);
            const rx = new Float32Array(count);
            const ry = new Float32Array(count);
            const rz = new Float32Array(count);
            const rvx = new Float32Array(count);
            const rvy = new Float32Array(count);
            const rvz = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                pos[i * 3] = point.x;
                pos[i * 3 + 1] = point.y;
                pos[i * 3 + 2] = SPARK_PLANE_Z;

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 0.05 + 0.05;

                vel[i * 3] = Math.cos(angle) * speed;
                vel[i * 3 + 1] = Math.sin(angle) * speed;
                vel[i * 3 + 2] = (Math.random() - 0.5) * 0.01;

                sizes[i] = 3.0 + Math.random() * 1.8;
                alphas[i] = 1.5;
                types[i] = Math.floor(Math.random() * 4);

                rx[i] = Math.random() * Math.PI * 2;
                ry[i] = Math.random() * Math.PI * 2;
                rz[i] = Math.random() * Math.PI * 2;

                rvx[i] = (Math.random() - 0.5) * 0.18;
                rvy[i] = (Math.random() - 0.5) * 0.18;
                rvz[i] = (Math.random() - 0.5) * 0.18;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
            geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
            geo.setAttribute('aType', new THREE.BufferAttribute(types, 1));
            geo.setAttribute('aRotX', new THREE.BufferAttribute(rx, 1));
            geo.setAttribute('aRotY', new THREE.BufferAttribute(ry, 1));
            geo.setAttribute('aRotZ', new THREE.BufferAttribute(rz, 1));

            const points = new THREE.Points(
                geo,
                new THREE.ShaderMaterial({
                    uniforms: { uTex: { value: colorTex } },
                    vertexShader: `
                        attribute float aSize;
                        attribute float aAlpha;
                        attribute float aType;
                        attribute float aRotX;
                        attribute float aRotY;
                        attribute float aRotZ;

                        varying float vAlpha;
                        varying float vType;
                        varying float vRotX;
                        varying float vRotY;
                        varying float vRotZ;

                        void main() {
                            vAlpha = aAlpha;
                            vType = aType;
                            vRotX = aRotX;
                            vRotY = aRotY;
                            vRotZ = aRotZ;

                            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                            gl_PointSize = aSize * (0.3 + 0.7 * aAlpha) * (350.0 / -mvPos.z);
                            gl_Position = projectionMatrix * mvPos;
                        }
                    `,
                    fragmentShader: `
                        uniform sampler2D uTex;

                        varying float vAlpha;
                        varying float vType;
                        varying float vRotX;
                        varying float vRotY;
                        varying float vRotZ;

                        void main() {
                            vec2 uv = gl_PointCoord - vec2(0.5);

                            float cY = cos(vRotY);
                            float cX = cos(vRotX);
                            float sZ = sin(vRotZ);
                            float cZ = cos(vRotZ);

                            // Z 軸旋轉
                            vec2 rotUV = vec2(
                                uv.x * cZ - uv.y * sZ,
                                uv.x * sZ + uv.y * cZ
                            );

                            vec2 rUV = rotUV;
                            rUV.x /= (abs(cY) < 0.15 ? 0.15 : cY);
                            rUV.y /= (abs(cX) < 0.15 ? 0.15 : cX);

                            if (abs(rUV.x) > 0.5 || abs(rUV.y) > 0.5) discard;

                            vec2 finalUV = rUV + 0.5;
                            finalUV.x = (finalUV.x + floor(vType + 0.5)) / 4.0;

                            vec4 texColor = texture2D(uTex, finalUV);
                            gl_FragColor = vec4(texColor.rgb, texColor.a * vAlpha);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );

            points.renderOrder = 2;
            scene.add(points);

            activeSparks.push({
                points,
                geo,
                pos,
                vel,
                alphas,
                rx,
                ry,
                rz,
                rvx,
                rvy,
                rvz,
                posAttr: geo.attributes.position,
                alphaAttr: geo.attributes.aAlpha,
                rotXAttr: geo.attributes.aRotX,
                rotYAttr: geo.attributes.aRotY,
                rotZAttr: geo.attributes.aRotZ
            });
        }

        // =========================================================
        // 9. 鍵盤座標對應
        // =========================================================
        function getKeyVisualPosition(key) {
            const row = "qwertyuiop".includes(key)
                ? "qwertyuiop"
                : "asdfghjkl".includes(key)
                    ? "asdfghjkl"
                    : "zxcvbnm";

            const x = (row.indexOf(key) / (row.length - 1)) * 12 - 6;
            const y = row === "qwertyuiop" ? 2.5 : row === "zxcvbnm" ? -2.5 : 0;

            return { x, y };
        }

        function getScreenPointOnPlane(clientX, clientY, targetZ) {
            const mouse = new THREE.Vector2(
                (clientX / window.innerWidth) * 2 - 1,
                -(clientY / window.innerHeight) * 2 + 1
            );

            const ray = new THREE.Raycaster();
            ray.setFromCamera(mouse, camera);

            const point = new THREE.Vector3();
            const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -targetZ);
            ray.ray.intersectPlane(plane, point);
            return point;
        }

        function projectPointToPlane(sourcePoint, targetZ) {
            const direction = sourcePoint.clone().sub(camera.position);
            const scale = (targetZ - camera.position.z) / direction.z;
            return camera.position.clone().add(direction.multiplyScalar(scale));
        }

        // =========================================================
        // 10. 鍵盤互動
        // =========================================================
        window.addEventListener('keydown', async (e) => {
            const key = e.key.toLowerCase();
            const midi = getMidiFromScaleKey(key, e.shiftKey, e.ctrlKey);

            if (midi !== null) {
                e.preventDefault();
                if (e.repeat) return;

                try {
                    await initAudio();
                    const { x, y } = getKeyVisualPosition(key);
                    const ringPoint = new THREE.Vector3(x, y, RING_PLANE_Z);
                    const bgPoint = projectPointToPlane(ringPoint, BG_PLANE_Z);
                    const sparkPoint = projectPointToPlane(ringPoint, SPARK_PLANE_Z);
                    triggerInteraction(bgPoint, ringPoint, midi);
                    spawnSparks(sparkPoint);

                    if (currentSound === 'piano') {
                        playPianoKeyDown(key, midi);
                    } else {
                        playMidi(midi);
                    }
                } catch (err) {
                    console.error('Audio init/play failed:', err);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();

            if (currentSound === 'piano' && activePianoKeyStates.has(key)) {
                releasePianoKey(key);
            }
        });

        window.addEventListener('mousedown', async (e) => {
            const bottomUi = document.getElementById('bottom-ui');
            const rect = bottomUi.getBoundingClientRect();

            if (
                e.clientX >= rect.left &&
                e.clientX <= rect.right &&
                e.clientY >= rect.top &&
                e.clientY <= rect.bottom
            ) {
                return;
            }

            try {
                await initAudio();

                const midi = getMidiFromScaleKey('a', false, false) ?? 60;
                const ringPoint = getScreenPointOnPlane(e.clientX, e.clientY, RING_PLANE_Z);
                const bgPoint = projectPointToPlane(ringPoint, BG_PLANE_Z);
                const sparkPoint = projectPointToPlane(ringPoint, SPARK_PLANE_Z);

                triggerInteraction(bgPoint, ringPoint, midi);
                spawnSparks(sparkPoint);
                playMidi(midi);
            } catch (err) {
                console.error('Mouse audio init/play failed:', err);
            }
        });

        // =========================================================
        // 11. 動畫循環
        // =========================================================
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now() * 0.001;
            bgUniforms.uTime.value = now;

            for (let i = activeRings.length - 1; i >= 0; i--) {
                const r = activeRings[i];
                r.uniforms.u_time.value = now;
                r.uniforms.u_intensity.value *= 0.94;

                if (r.uniforms.u_intensity.value < 0.01) {
                    scene.remove(r.mesh);
                    r.mesh.geometry.dispose();
                    r.mesh.material.dispose();
                    activeRings.splice(i, 1);
                }
            }

            for (let i = activeSparks.length - 1; i >= 0; i--) {
                const s = activeSparks[i];
                let alive = 0;

                for (let j = 0; j < s.alphas.length; j++) {
                    if (s.alphas[j] > 0.01) {
                        s.pos[j * 3] += s.vel[j * 3];
                        s.pos[j * 3 + 1] += s.vel[j * 3 + 1];
                        s.pos[j * 3 + 2] += s.vel[j * 3 + 2];

                        s.vel[j * 3] *= 0.98;
                        s.vel[j * 3 + 1] *= 0.98;
                        s.vel[j * 3 + 2] *= 0.985;

                        s.rx[j] += s.rvx[j];
                        s.ry[j] += s.rvy[j];
                        s.rz[j] += s.rvz[j];

                        s.rvx[j] *= 0.992;
                        s.rvy[j] *= 0.992;
                        s.rvz[j] *= 0.992;

                        s.alphas[j] *= 0.99;
                        alive++;
                    }
                }

                s.posAttr.needsUpdate = true;
                s.alphaAttr.needsUpdate = true;
                s.rotXAttr.needsUpdate = true;
                s.rotYAttr.needsUpdate = true;
                s.rotZAttr.needsUpdate = true;

                if (alive === 0) {
                    scene.remove(s.points);
                    s.geo.dispose();
                    s.points.material.dispose();
                    activeSparks.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateBgPoints();
        });
    </script>
</body>
</html>
